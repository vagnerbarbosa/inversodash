# Carregar variáveis de ambiente do arquivo .env
# IMPORTANTE: Copie .env.example para .env e configure suas credenciais

services:
  # Banco de dados InfluxDB para armazenar histórico
  influxdb:
    image: influxdb:2.7-alpine
    container_name: inversodash-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-inversodash}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-changeme}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - inversodash-network

  # Backend Python
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inversodash-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - INVERTER_IP=${INVERTER_IP:-${INVERTER_IP}}
      - INVERTER_PORT=${INVERTER_PORT:-502}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-inversodash}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-inversodash}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    networks:
      - inversodash-network
    depends_on:
      - influxdb
    # Modo de rede host para acessar o inversor na rede local
    extra_hosts:
      - "inverter:${INVERTER_IP:-${INVERTER_IP}}"

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inversodash-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inversodash-network

volumes:
  influxdb-data:

networks:
  inversodash-network:
    driver: bridge
